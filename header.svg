<svg fill="none" viewBox="0 0 1200 320" width="1200" height="320" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes gradientShift {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }
        @keyframes glow {
          0%, 100% { text-shadow: 0 0 20px rgba(88,166,255,0.4), 0 0 60px rgba(31,111,235,0.1); }
          50% { text-shadow: 0 0 30px rgba(88,166,255,0.7), 0 0 80px rgba(31,111,235,0.3), 0 0 120px rgba(88,166,255,0.1); }
        }
        @keyframes fadeInUp {
          0% { opacity: 0; transform: translateY(15px); }
          100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes linePulse {
          0%, 100% { opacity: 0.5; width: 60px; }
          50% { opacity: 1; width: 100px; }
        }
        @keyframes twinkle {
          0%, 100% { opacity: 0; transform: scale(0.5); }
          50% { opacity: var(--o, 0.8); transform: scale(1); }
        }
        @keyframes orbit {
          0% { transform: rotate(0deg) translateX(var(--r, 140px)) rotate(0deg); }
          100% { transform: rotate(360deg) translateX(var(--r, 140px)) rotate(-360deg); }
        }
        .c {
          font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          width: 100%;
          height: 320px;
          background: linear-gradient(-45deg, #0d1117, #0d1117, #161b22, #0d2847, #161b22, #0d1117, #0d1117);
          background-size: 600% 600%;
          animation: gradientShift 20s ease infinite;
          position: relative;
          overflow: hidden;
          box-sizing: border-box;
        }
        .s {
          position: absolute;
          border-radius: 50%;
          background: #58a6ff;
          animation: twinkle var(--d, 3s) ease-in-out var(--dl, 0s) infinite;
        }
        .orb {
          position: absolute;
          width: 6px;
          height: 6px;
          border-radius: 50%;
          background: radial-gradient(circle, rgba(88,166,255,0.8), transparent);
          top: 50%;
          left: 50%;
          margin: -3px 0 0 -3px;
          animation: orbit var(--sp, 20s) linear infinite;
          opacity: 0.6;
        }
        .ring {
          position: absolute;
          border: 1px solid rgba(88,166,255,0.06);
          border-radius: 50%;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
        }
        .name {
          font-size: 72px;
          font-weight: 800;
          color: #ffffff;
          margin: 0;
          letter-spacing: 4px;
          animation: glow 4s ease-in-out infinite;
          position: relative;
          z-index: 2;
        }
        .sub {
          font-size: 15px;
          color: #58a6ff;
          margin: 14px 0 0 0;
          letter-spacing: 8px;
          text-transform: uppercase;
          animation: fadeInUp 1.2s ease 0.3s both;
          position: relative;
          z-index: 2;
          font-weight: 500;
        }
        .line {
          height: 2px;
          background: linear-gradient(90deg, transparent, #58a6ff, transparent);
          margin-top: 18px;
          border-radius: 2px;
          animation: linePulse 4s ease-in-out infinite;
          position: relative;
          z-index: 2;
        }
        .mesh {
          position: absolute;
          width: 100%;
          height: 100%;
          top: 0;
          left: 0;
          background-image:
            radial-gradient(circle at 20% 50%, rgba(31,111,235,0.08) 0%, transparent 50%),
            radial-gradient(circle at 80% 50%, rgba(88,166,255,0.06) 0%, transparent 50%),
            radial-gradient(circle at 50% 20%, rgba(31,111,235,0.04) 0%, transparent 40%);
        }
      </style>
      <div class="c">
        <div class="mesh"></div>

        <!-- Orbital rings -->
        <div class="ring" style="width:280px;height:280px;"></div>
        <div class="ring" style="width:400px;height:400px;"></div>
        <div class="ring" style="width:540px;height:540px;"></div>

        <!-- Orbiting particles -->
        <div class="orb" style="--r:140px;--sp:25s;"></div>
        <div class="orb" style="--r:200px;--sp:35s;width:4px;height:4px;margin:-2px 0 0 -2px;opacity:0.4;"></div>
        <div class="orb" style="--r:270px;--sp:45s;width:3px;height:3px;margin:-1.5px 0 0 -1.5px;opacity:0.3;"></div>

        <!-- Stars field -->
        <div class="s" style="width:2px;height:2px;top:8%;left:3%;--d:3s;--o:0.9;--dl:0s;"></div>
        <div class="s" style="width:1px;height:1px;top:15%;left:12%;--d:4s;--o:0.5;--dl:1s;"></div>
        <div class="s" style="width:3px;height:3px;top:12%;left:25%;--d:5s;--o:0.7;--dl:0.5s;"></div>
        <div class="s" style="width:1px;height:1px;top:6%;left:38%;--d:3.5s;--o:0.4;--dl:2s;"></div>
        <div class="s" style="width:2px;height:2px;top:18%;left:52%;--d:4.5s;--o:0.6;--dl:0.8s;"></div>
        <div class="s" style="width:1px;height:1px;top:10%;left:67%;--d:3s;--o:0.8;--dl:1.5s;"></div>
        <div class="s" style="width:2px;height:2px;top:5%;left:78%;--d:5.5s;--o:0.5;--dl:0.3s;"></div>
        <div class="s" style="width:1px;height:1px;top:14%;left:88%;--d:4s;--o:0.7;--dl:2.5s;"></div>
        <div class="s" style="width:3px;height:3px;top:20%;left:95%;--d:3.2s;--o:0.6;--dl:1.2s;"></div>
        <div class="s" style="width:1px;height:1px;top:75%;left:5%;--d:4.8s;--o:0.5;--dl:0.7s;"></div>
        <div class="s" style="width:2px;height:2px;top:82%;left:18%;--d:3.5s;--o:0.8;--dl:1.8s;"></div>
        <div class="s" style="width:1px;height:1px;top:88%;left:30%;--d:5s;--o:0.4;--dl:0.2s;"></div>
        <div class="s" style="width:2px;height:2px;top:78%;left:45%;--d:4.2s;--o:0.6;--dl:2.2s;"></div>
        <div class="s" style="width:1px;height:1px;top:85%;left:60%;--d:3.8s;--o:0.7;--dl:1.1s;"></div>
        <div class="s" style="width:3px;height:3px;top:72%;left:72%;--d:5.2s;--o:0.5;--dl:0.9s;"></div>
        <div class="s" style="width:1px;height:1px;top:90%;left:82%;--d:4.5s;--o:0.8;--dl:1.6s;"></div>
        <div class="s" style="width:2px;height:2px;top:80%;left:93%;--d:3.3s;--o:0.6;--dl:2.8s;"></div>
        <div class="s" style="width:1px;height:1px;top:40%;left:2%;--d:4s;--o:0.4;--dl:0.4s;"></div>
        <div class="s" style="width:1px;height:1px;top:55%;left:97%;--d:3.7s;--o:0.5;--dl:1.3s;"></div>
        <div class="s" style="width:2px;height:2px;top:35%;left:8%;--d:5.5s;--o:0.3;--dl:2.1s;"></div>
        <div class="s" style="width:1px;height:1px;top:62%;left:92%;--d:4.3s;--o:0.6;--dl:0.6s;"></div>

        <h1 class="name">Ziad Momen</h1>
        <p class="sub">Full-Stack Engineer &#x2022; Infrastructure Architect &#x2022; AI Builder</p>
        <div class="line"></div>
      </div>
    </div>
  </foreignObject>
</svg>
